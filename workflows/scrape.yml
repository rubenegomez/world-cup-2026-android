name: Actualizar Resultados Mundial 2026

on:
  schedule:
    # Se ejecuta cada 15 minutos
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permite ejecución manual desde la pestaña Actions de GitHub

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Scraper de Resultados
      run: |
        python scraper/scraper.py

    - name: Guardar y Subir Cambios (Commit & Push)
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add fixtures_live.json
        # Solo hace commit si hay cambios en el archivo JSON
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update fixtures_live.json" && git push)
